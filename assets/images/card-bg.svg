    <path d="M150,20 Q200,30 230,60 Q260,90 250,130 Q240,170 210,190 Q180,210 150,200"/>
    <path d="M160,25 Q205,35 235,65 Q265,95 255,135 Q245,175 215,195 Q185,215 155,205"/>
    <path d="M170,30 Q210,40 240,70 Q270,100 260,140 Q250,180 220,200 Q190,220 160,210"/>
    <path d="M140,15 Q195,25 225,55 Q255,85 245,125 Q235,165 205,185 Q175,205 145,195"/>
    <path d="M130,10 Q190,20 220,50 Q250,80 240,120 Q230,160 200,180 Q170,200 140,190"/>
    <path d="M180,35 Q215,45 245,75 Q275,105 265,145 Q255,185 225,205 Q195,225 165,215"/>
    
    <!-- Center pattern -->
    <path d="M100,200 Q130,220 160,240 Q190,260 180,290 Q170,320 140,330 Q110,340 90,320"/>
    <path d="M105,205 Q135,225 165,245 Q195,265 185,295 Q175,325 145,335 Q115,345 95,325"/>
    <path d="M95,195 Q125,215 155,235 Q185,255 175,285 Q165,315 135,325 Q105,335 85,315"/>
    <path d="M110,210 Q140,230 170,250 Q200,270 190,300 Q180,330 150,340 Q120,350 100,330"/>
    
    <!-- Bottom-right pattern -->
    <path d="M180,350 Q210,360 240,380 Q270,400 260,430 Q250,460 220,470"/>
    <path d="M185,355 Q215,365 245,385 Q275,405 265,435 Q255,465 225,475"/>
    <path d="M175,345 Q205,355 235,375 Q265,395 255,425 Q245,455 215,465"/>
    <path d="M190,360 Q220,370 250,390 Q280,410 270,440 Q260,470 230,480"/>
    
    <!-- Left side pattern -->
    <path d="M20,100 Q40,130 50,160 Q60,190 50,220 Q40,250 20,270"/>
    <path d="M25,105 Q45,135 55,165 Q65,195 55,225 Q45,255 25,275"/>
    <path d="M15,95 Q35,125 45,155 Q55,185 45,215 Q35,245 15,265"/>
    
    <!-- Additional organic lines -->
    <path d="M60,380 Q80,400 110,410 Q140,420 160,440 Q180,460 170,476"/>
    <path d="M55,375 Q75,395 105,405 Q135,415 155,435 Q175,455 165,476"/>
    <path d="M200,80 Q220,100 230,130 Q240,160 230,190"/>
    <path d="M195,75 Q215,95 225,125 Q235,155 225,185"/>
    <path d="M205,85 Q225,105 235,135 Q245,165 235,195"/>
    
    <!-- More fingerprint swirls -->
    <path d="M120,80 Q140,90 155,110 Q170,130 165,155 Q160,180 140,190"/>
    <path d="M115,75 Q135,85 150,105 Q165,125 160,150 Q155,175 135,185"/>
    <path d="M125,85 Q145,95 160,115 Q175,135 170,160 Q165,185 145,195"/>
    
    <path d="M80,300 Q100,310 120,330 Q140,350 130,380"/>
    <path d="M75,295 Q95,305 115,325 Q135,345 125,375"/>
    <path d="M85,305 Q105,315 125,335 Q145,355 135,385"/>
  </g>
  
  <!-- Green-yellow gradient circle (top-left) with cutout -->
  <defs>
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8d84c"/>
      <stop offset="100%" stop-color="#2a9d8f"/>
    </linearGradient>
  </defs>
  <!-- Outer circle -->
  <circle cx="30" cy="100" r="75" fill="url(#circleGrad)"/>
  <!-- Inner cutout (white circle to make the ring) -->
  <circle cx="50" cy="110" r="40" fill="#f5f5f5"/>
  
  <!-- Teal curved stripe (bottom-left) -->
  <path d="M25,320 Q35,380 50,420 Q65,460 80,476" stroke="#4db6ac" stroke-width="18" fill="none" stroke-linecap="round"/>
</svg>
